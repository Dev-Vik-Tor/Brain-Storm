name: Database Migrations CI/CD

on:
  pull_request:
    paths:
      - 'apps/backend/src/migrations/**'
      - 'apps/backend/src/entities/**'
  push:
    branches: [main]
    paths:
      - 'apps/backend/src/migrations/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-migrations:
    name: Validate Migration Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate migration structure
        working-directory: apps/backend
        run: |
          echo "Checking migration files..."
          for file in src/migrations/*.ts; do
            if [ -f "$file" ]; then
              echo "Validating $file"
              # Check for required methods
              if ! grep -q "public async up" "$file"; then
                echo "❌ Missing 'up' method in $file"
                exit 1
              fi
              if ! grep -q "public async down" "$file"; then
                echo "❌ Missing 'down' method in $file"
                exit 1
              fi
              echo "✅ $file is valid"
            fi
          done

      - name: Check migration naming convention
        working-directory: apps/backend
        run: |
          echo "Checking migration naming convention..."
          for file in src/migrations/*.ts; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              # Check if filename matches pattern: TIMESTAMP-Description.ts
              if ! [[ "$filename" =~ ^[0-9]{13}-[A-Za-z0-9]+\.ts$ ]]; then
                echo "❌ Invalid naming convention: $filename"
                echo "Expected format: TIMESTAMP-Description.ts (e.g., 1234567890123-AddUserTable.ts)"
                exit 1
              fi
            fi
          done
          echo "✅ All migration files follow naming convention"

      - name: Run migration validation
        working-directory: apps/backend
        run: npm run migration:validate
        continue-on-error: true

  test-migrations-dry-run:
    name: Test Migrations (Dry Run)
    runs-on: ubuntu-latest
    needs: validate-migrations
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: brain_storm_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U test_user; do
            echo 'Waiting for PostgreSQL...'
            sleep 1
          done

      - name: Run migrations (dry-run)
        working-directory: apps/backend
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test_user
          DATABASE_PASSWORD: test_password
          DATABASE_NAME: brain_storm_test
          NODE_ENV: test
        run: |
          echo "Running migrations on test database..."
          npm run migration:run || {
            echo "❌ Migration failed"
            exit 1
          }
          echo "✅ Migrations completed successfully"

      - name: Test rollback
        working-directory: apps/backend
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: test_user
          DATABASE_PASSWORD: test_password
          DATABASE_NAME: brain_storm_test
          NODE_ENV: test
        run: |
          echo "Testing rollback..."
          npm run migration:rollback || {
            echo "⚠️ Rollback test failed (may be expected if no migrations to rollback)"
          }
          echo "✅ Rollback test completed"

  generate-migration-report:
    name: Generate Migration Report
    runs-on: ubuntu-latest
    needs: test-migrations-dry-run
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate migration report
        working-directory: apps/backend
        run: |
          echo "# Migration Report" > migration-report.md
          echo "" >> migration-report.md
          echo "## Migration Files" >> migration-report.md
          echo "" >> migration-report.md
          
          if [ -d "src/migrations" ]; then
            ls -1 src/migrations/*.ts | while read file; do
              filename=$(basename "$file")
              echo "- \`$filename\`" >> migration-report.md
            done
          else
            echo "No migrations found" >> migration-report.md
          fi
          
          cat migration-report.md

      - name: Comment migration report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('apps/backend/migration-report.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  notify-migration-status:
    name: Notify Migration Status
    runs-on: ubuntu-latest
    needs: [validate-migrations, test-migrations-dry-run]
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.validate-migrations.result }}" == "success" ] && [ "${{ needs.test-migrations-dry-run.result }}" == "success" ]; then
            echo "status=✅ All migration checks passed" >> $GITHUB_OUTPUT
          else
            echo "status=⚠️ Some migration checks failed" >> $GITHUB_OUTPUT
          fi

      - name: Comment status on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.status.outputs.status }}';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Database Migrations\n\n${status}`
            });
